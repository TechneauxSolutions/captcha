<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo CAPTCHA</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
    background: #f7f7f7;
  }
  h2 {
    margin-bottom: 20px;
  }
  .captcha-grid {
    display: grid;
    grid-template-columns: repeat(3, 150px);
    grid-gap: 15px;
  }
  .captcha-grid img {
    width: 150px;
    height: 150px;
    cursor: pointer;
    border: 3px solid transparent;
    border-radius: 10px;
    transition: border 0.2s;
  }
  .captcha-grid img.selected {
    border: 3px solid #4CAF50;
  }
  button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }
  .result {
    margin-top: 15px;
    font-weight: bold;
  }
</style>
</head>
<body>

<h2>Select all logos of local organizations</h2>

<div class="captcha-grid">
  <img src="https://i.imgur.com/TeBMAdZ.png" data-correct="true" alt="techneaux">
  <img src="https://i.imgur.com/FGIfaFX.png" data-correct="false" alt="plaid">
  <img src="https://i.imgur.com/XjsFKaw.png" data-correct="true" alt="schoolmint">
  <img src="https://i.imgur.com/1QMrpR5.png" data-correct="true" alt="opportunity machine">
  <img src="https://i.imgur.com/VA7zHSA.png" data-correct="false" alt="retool">
  <img src="https://i.imgur.com/y2D3gjH.png" data-correct="true" alt="cgi">
  <img src="https://i.imgur.com/Ex3z4C1.png" data-correct="true" alt="lft">
  <img src="https://i.imgur.com/Ix2Ui85.png" data-correct="true" alt="s1">
  <img src="https://i.imgur.com/4N3Umqf.png" data-correct="false" alt="snowflake">
</div>

<button onclick="checkCaptcha()">Verify</button>
<div class="result" id="result"></div>

<script>
  const images = document.querySelectorAll('.captcha-grid img');
  images.forEach(img => {
    img.addEventListener('click', () => {
      img.classList.toggle('selected');
    });
  });

  function checkCaptcha() {
    let correct = true;
    images.forEach(img => {
      const isSelected = img.classList.contains('selected');
      const isCorrect = img.getAttribute('data-correct') === 'true';
      if (isSelected !== isCorrect) {
        correct = false;
      }
    });

    const result = document.getElementById('result');
    if (correct) {
      result.style.color = 'green';
      result.textContent = 'CAPTCHA passed ✅';
    } else {
      result.style.color = 'red';
      result.textContent = 'CAPTCHA failed ❌. Try again.';
    }
  }
</script>

</body>
</html>
